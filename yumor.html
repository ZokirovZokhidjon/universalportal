<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ҳангомалар ва Латифалар - 🤣🤣🤣🤣</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 1. Умумий дизайн (Қувноқ ва иссиқ ранглар) */
        body {
            font-family: 'Comic Sans MS', 'Segoe UI', cursive, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff9e6; /* Енгил сариқ фонда */
            color: #444;
        }

        /* 2. Шапка ва Смайликлар */
        header {
            background: #f1c40f;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .humor-logo {
            font-size: 35px;
            font-weight: bold;
            color: #2c3e50;
            text-decoration: none;
        }
        .emoji-bar {
            font-size: 40px;
            margin-top: 10px;
            display: block;
        }

        /* 3. Меню */
        nav {
            background: #e67e22;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav a {
            color: white;
            padding: 15px 20px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        nav a:hover, nav a.active {
            background: #d35400;
        }

        /* 4. Асосий қисм */
        .main-wrapper {
            max-width: 1000px;
            margin: 30px auto;
            display: flex;
            gap: 25px;
            padding: 0 15px;
        }

        .humor-posts { flex: 7; }
        .sidebar { flex: 3; }

        /* 5. Ҳангома карточкаси */
        .post-card {
            background: white;
            border-radius: 20px;
            border: 3px solid #f1c40f;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }
        .post-card img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }
        .post-content { padding: 25px; }
        .post-content h2 {
            color: #d35400;
            margin-top: 0;
            font-size: 26px;
        }
        .post-content p {
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-line; /* Матндаги қатор ташлашларни сақлайди */
        }

        .video-container {
            background: #000;
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
        }
        .video-container iframe { width: 100%; height: 350px; border: none; }

        /* 6. Ўнг томондаги рўйхат */
        .joke-list-widget {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .joke-list-widget h3 {
            color: #c0392b;
            text-align: center;
            border-bottom: 2px dashed #f1c40f;
            padding-bottom: 10px;
        }
        .link-list { list-style: none; padding: 0; }
        .link-list li {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .link-list a {
            text-decoration: none;
            color: #555;
            font-size: 16px;
            font-weight: 500;
        }
        .link-list a:hover { color: #e67e22; padding-left: 5px; transition: 0.2s; }

        /* Мобил версия */
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .emoji-bar { font-size: 30px; }
        }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header>
        <a href="index.html" class="humor-logo">ҲАНГОМАЛАР ВА ЛАТИФАЛАР</a>
        <span class="emoji-bar">🤣🤣🤣🤣</span>
    </header>

    <!-- Навигация -->
    <nav>
        <a href="index.html">Асосий</a>
        <a href="cock.html">Ошхона</a>
        <a href="med.html">Табобат</a>
        <a href="yumor.html" class="active">Ҳангомалар</a>
        <a href="news.html">Янгиликлар</a>
    </nav>

    <!-- Контент -->
    <div class="main-wrapper">
        
        <!-- Латифалар лентаси -->
        <main class="humor-posts" id="post-display-area">
            <!-- Хабарлар шу ерга тушади -->
        </main>

        <!-- Ўнг томон -->
        <aside class="sidebar">
            <div class="joke-list-widget">
                <h3><i class="fas fa-laugh-squint"></i> Кулги соати</h3>
                <ul class="link-list" id="sidebar-links">
                    <!-- Линклар скрипт орқали чиқади -->
                </ul>
            </div>
        </aside>
        
    </div>

    <!-- Кўприк скрипти -->
     <script type="module" src="bridge.js"></script>
    <script src="bridge.js"></script>

</body>
</html>
