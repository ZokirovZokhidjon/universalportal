<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел - Universal Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; }
        #login-section { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        #admin-main-content { display: none; max-width: 900px; margin: 30px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .profile-header { background: #3498db; color: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; margin-bottom: 30px; }
        .avatar { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-right: 20px; border: 2px solid white; }
        
        .notice-section { background: #fff4e5; border: 2px dashed #ff9800; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        input, textarea, select { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus, textarea:focus { border-color: #3498db; }
        
        button { border: none; cursor: pointer; font-weight: bold; border-radius: 12px; transition: 0.3s; }
        .btn-main { width: 100%; background: #3498db; color: white; padding: 15px; font-size: 18px; }
        .btn-main:hover { background: #2980b9; }
        .btn-notice { background: #ff9800; color: white; padding: 10px 20px; }
        
        .post-item { background: #fcfcfc; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-top { background: #2ecc71; color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-size: 14px; display: inline-block; }
        .btn-delete { background: #e74c3c; color: white; padding: 8px 12px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-card">
            <i class="fas fa-shield-alt" style="font-size: 60px; color: #3498db; margin-bottom: 20px;"></i>
            <h2>Админ Кириш</h2>
            <input type="email" id="email" placeholder="Электрон почта">
            <input type="password" id="pass" placeholder="Парол">
            <button class="btn-main" id="loginBtn">КИРИШ</button>
            <p><a href="index.html" style="color: #666; text-decoration: none; font-size: 14px; margin-top: 10px; display: block;">Асосий саҳифага қайтиш</a></p>
        </div>
    </div>

    <div id="admin-main-content">
        <div class="profile-header">
            <div class="avatar"><i class="fas fa-user-tie"></i></div>
            <div>
                <h2 style="margin:0">Зохиджон Носирович</h2>
                <small>Бош Администратор | Universal Portal</small>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <a href="index.html" class="btn-top"><i class="fas fa-home"></i> Саҳифага қайтиш</a>
            <button id="logoutBtn" class="btn-top" style="background:#e74c3c"><i class="fas fa-sign-out-alt"></i> Чиқиш</button>
        </div>

        <div class="notice-section">
            <label><b><i class="fas fa-bullhorn"></i> Тезкор эълон (Ҳамма саҳифаларда кўринади):</b></label>
            <div style="display:flex; gap:10px; margin-top:10px">
                <input type="text" id="qNotice" style="margin:0" placeholder="Муҳим хабарни ёзинг...">
                <button class="btn-notice" id="sendNBtn">ЮБОРИШ</button>
                <button class="btn-notice" style="background:#666" id="delNBtn">ЎЧИРИШ</button>
            </div>
        </div>

        <h3><i class="fas fa-plus-circle"></i> Янги мақола қўшиш</h3>
        <select id="cat">
            <option value="news">Янгиликлар</option>
            <option value="med">Табобат</option>
            <option value="stories">Ҳикоялар</option>
            <option value="yumor">Ҳангомалар</option>
            <option value="cook">Кулинария</option>
        </select>
        <input type="text" id="title" placeholder="Мақола сарлавҳаси">
        <input type="text" id="img" placeholder="Расм URL линки (ёки Firebase'дан олинган код)">
        <textarea id="txt" rows="6" placeholder="Мақоланинг тўлиқ матни..."></textarea>
        <button class="btn-main" id="pubBtn">НАШР ҚИЛИШ</button>

        <div style="margin-top:40px">
            <h3><i class="fas fa-list"></i> Бошқариш (Мақолалар рўйхати)</h3>
            <div id="pContainer">Юкланмоқда...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Сизнинг Firebase созламаларингиз
        const firebaseConfig = {
            apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
            authDomain: "universal-portal-108b7.firebaseapp.com",
            databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "universal-portal-108b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Кириш функцияси
        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Хато: " + e.message));
        };

        // Сессияни текшириш
        onAuthStateChanged(auth, u => {
            if(u) {
                document.getElementById('login-section').style.display='none';
                document.getElementById('admin-main-content').style.display='block';
                loadPosts();
            } else {
                document.getElementById('login-section').style.display='flex';
                document.getElementById('admin-main-content').style.display='none';
            }
        });

        // Чиқиш
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // Тезкор эълонни юбориш
        document.getElementById('sendNBtn').onclick = async () => {
            const text = document.getElementById('qNotice').value;
            if(!text) return alert("Эълон матнини ёзинг!");
            await set(ref(db, 'site_notice'), { text: text });
            alert("Эълон асосий саҳифага чиқарилди!");
        };

        // Эълонни ўчириш
        document.getElementById('delNBtn').onclick = async () => {
            await set(ref(db, 'site_notice'), { text: "" });
            document.getElementById('qNotice').value = "";
            alert("Эълон ўчирилди.");
        };

        // Мақола нашр қилиш
        document.getElementById('pubBtn').onclick = async () => {
            const title = document.getElementById('title').value;
            const content = document.getElementById('txt').value;
            const category = document.getElementById('cat').value;
            const image = document.getElementById('img').value;

            if(!title || !content) return alert("Сарлавҳа ва матнни тўлдиринг!");

            const data = {
                title: title,
                content: content,
                category: category,
                image: image || "https://via.placeholder.com/400x200",
                time: new Date().toLocaleString('uz-UZ')
            };

            await push(ref(db, 'all_posts'), data);
            alert("Мақола муваффақиятли қўшилди!");
            
            // Формани тозалаш
            document.getElementById('title').value = "";
            document.getElementById('txt').value = "";
            document.getElementById('img').value = "";
        };

        // Мақолаларни юклаш
        function loadPosts() {
            onValue(ref(db, 'all_posts'), s => {
                const pContainer = document.getElementById('pContainer');
                pContainer.innerHTML = "";
                const d = s.val();
                if(d) {
                    Object.keys(d).reverse().forEach(id => {
                        const div = document.createElement('div');
                        div.className = 'post-item';
                        div.innerHTML = `
                            <div>
                                <strong>${d[id].title}</strong> <br>
                                <small style="color:#3498db">${d[id].category}</small>
                            </div>
                            <button class="btn-delete" data-id="${id}"><i class="fas fa-trash"></i> Ўчириш</button>
                        `;
                        pContainer.appendChild(div);
                    });

                    // Ўчириш тугмаларига ҳодиса қўшиш
                    document.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.onclick = (e) => {
                            const postId = e.currentTarget.getAttribute('data-id');
                            deleteP(postId);
                        };
                    });
                } else {
                    pContainer.innerHTML = "<p>Мақолалар мавжуд эмас.</p>";
                }
            });
        }

        // Ўчириш функцияси
        async function deleteP(id) {
            if(confirm("Бу мақолани ростдан ҳам ўчирмоқчимисиз?")) {
                await remove(ref(db, 'all_posts/' + id));
                alert("Мақола ўчирилди.");
            }
        }
    </script>
</body>
</html>
