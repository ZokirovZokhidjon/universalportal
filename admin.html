<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел - Universal Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        #login-section { height: 90vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        #admin-main-content { display: none; max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .profile-header { background: #3498db; color: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; margin-bottom: 25px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-main { width: 100%; background: #3498db; color: white; padding: 15px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-update { background: #2ecc71 !important; }
        .upload-area { background: #f9f9f9; border: 2px dashed #3498db; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        #imgPreview { width: 100%; max-height: 200px; object-fit: contain; margin-top: 10px; display: none; border-radius: 10px; }
        .post-item { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-edit { background: #f1c40f; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-card">
            <h2>Админ Кириш</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Парол">
            <button class="btn-main" id="loginBtn">КИРИШ</button>
        </div>
    </div>

    <div id="admin-main-content">
        <div class="profile-header">
            <div style="font-size: 40px; margin-right: 15px;"><i class="fas fa-user-circle"></i></div>
            <div>
                <h3 style="margin:0">Зоҳиджон Носирович</h3>
                <small>Бош Администратор</small>
            </div>
        </div>

        <h3 id="formTitle">Янги мақола қўшиш</h3>
        <select id="cat">
            <option value="news">Янгиликлар</option>
            <option value="med">Табобат</option>
            <option value="cinema">Кинотеатр</option>
            <option value="clips">Мусиқий клиплар</option>
            <option value="stories">Ҳикоялар</option>
        </select>
        
        <input type="text" id="title" placeholder="Сарлавҳа">
        
        <div class="upload-area">
            <input type="file" id="fileInput" accept="image/*">
            <img id="imgPreview">
            <input type="text" id="imgUrl" placeholder="Ёки расм URL манзили" style="margin-top:10px">
        </div>

        <textarea id="videoIframe" rows="3" placeholder="Видео коди (iframe)"></textarea>
        <textarea id="txt" rows="5" placeholder="Матн..."></textarea>
        
        <button class="btn-main" id="pubBtn">НАШР ҚИЛИШ</button>
        <button id="cancelBtn" style="display:none; width:100%; margin-top:5px; background:#aaa; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">БЕКОР ҚИЛИШ</button>

        <div style="margin-top:30px">
            <h3>Мақолалар рўйхати</h3>
            <div id="pContainer">Юкланмоқда...</div>
        </div>

        <button id="logoutBtn" style="background:#e74c3c; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; margin-top:20px;">ЧИҚИШ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
            authDomain: "universal-portal-108b7.firebaseapp.com",
            databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "universal-portal-108b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let editId = null;
        let base64Image = "";

        // Расмни танлаш
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                base64Image = reader.result;
                document.getElementById('imgPreview').src = reader.result;
                document.getElementById('imgPreview').style.display = "block";
            };
            if(file) reader.readAsDataURL(file);
        };

        // Кириш ва ҳолат
        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Хато!"));
        };

        onAuthStateChanged(auth, u => {
            document.getElementById('login-section').style.display = u ? 'none' : 'flex';
            document.getElementById('admin-main-content').style.display = u ? 'block' : 'none';
            if(u) loadPosts();
        });

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // Сақлаш
        document.getElementById('pubBtn').onclick = async () => {
            if(!title.value) return alert("Сарлавҳа ёзинг!");
            const data = {
                title: title.value,
                content: txt.value,
                category: cat.value,
                image: base64Image || imgUrl.value || "https://via.placeholder.com/400x200",
                video: videoIframe.value,
                time: editId ? document.getElementById('pubBtn').dataset.time : new Date().toLocaleString()
            };
            if(editId) await update(ref(db, 'all_posts/'+editId), data);
            else await push(ref(db, 'all_posts'), data);
            alert("Сақланди!");
            resetForm();
        };

        function loadPosts() {
            onValue(ref(db, 'all_posts'), s => {
                const container = document.getElementById('pContainer');
                container.innerHTML = "";
                const d = s.val();
                if(d) Object.keys(d).reverse().forEach(id => {
                    const div = document.createElement('div');
                    div.className = 'post-item';
                    div.innerHTML = `<div>${d[id].title}</div><div>
                        <button class="btn-edit" onclick="editPost('${id}')">✏️</button>
                        <button class="btn-delete" onclick="deletePost('${id}')">🗑️</button>
                    </div>`;
                    container.appendChild(div);
                });
            });
        }

        window.editPost = (id) => {
            onValue(ref(db, 'all_posts/'+id), s => {
                const p = s.val();
                editId = id;
                title.value = p.title; txt.value = p.content; cat.value = p.category;
                videoIframe.value = p.video || "";
                if(p.image.startsWith('data:')) {
                    base64Image = p.image;
                    document.getElementById('imgPreview').src = p.image;
                    document.getElementById('imgPreview').style.display = "block";
                } else { imgUrl.value = p.image; }
                document.getElementById('pubBtn').innerText = "ЯНГИЛАШ";
                document.getElementById('pubBtn').classList.add('btn-update');
                document.getElementById('cancelBtn').style.display = "block";
                window.scrollTo(0,0);
            }, {onlyOnce: true});
        };

        window.deletePost = (id) => { if(confirm("Ўчирилсинми?")) remove(ref(db, 'all_posts/'+id)); };

        window.resetForm = () => {
            editId = null; base64Image = ""; title.value = ""; txt.value = ""; videoIframe.value = "";
            imgUrl.value = ""; fileInput.value = ""; imgPreview.style.display = "none";
            pubBtn.innerText = "НАШР ҚИЛИШ"; pubBtn.classList.remove('btn-update');
            cancelBtn.style.display = "none";
        };
        document.getElementById('cancelBtn').onclick = resetForm;
    </script>
</body>
</html>
