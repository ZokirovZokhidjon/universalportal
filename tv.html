<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNMEDIA-TV Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0d0d; color: #ffffff; display: flex; height: 100vh; overflow: hidden; margin: 0; font-family: sans-serif; }
        .sidebar { width: 350px; background: #141414; border-right: 2px solid #ef1a4a; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; color: #ef1a4a; font-weight: bold; }
        .sidebar-header a { text-decoration: none; color: gold; font-size: 14px; display: block; margin-top: 10px; }
        .channel-list { flex: 1; overflow-y: auto; padding: 15px; }
        .channel-item { display: flex; align-items: center; padding: 10px; cursor: pointer; border-bottom: 1px solid #222; border-radius: 4px; margin-bottom: 5px; transition: 0.2s; }
        .channel-item:hover, .channel-item.active { background: #222; border-left: 3px solid #ef1a4a; }
        .channel-logo { width: 40px; height: 40px; object-fit: contain; margin-right: 15px; background: #000; border-radius: 4px; }
        .channel-name { font-size: 14px; font-weight: 500; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .player-container { flex: 1; background: #000; position: relative; }
        .video-js { width: 100% !important; height: 100% !important; }
        .search-box { padding: 15px; }
        .search-box input { width: 100%; padding: 10px; border-radius: 5px; border: none; background: #222; color: #fff; box-sizing: border-box; }
        .search-box input:focus { outline: 1px solid #ef1a4a; }
        .player-footer { padding: 20px; background: #111; border-top: 1px solid #222; }
        .current-title { font-size: 16px; color: #ef1a4a; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebarMenu">
        <div class="sidebar-header">
            UNMEDIA-TV PORTAL
            <a href="index.html"><i class="fa-solid fa-house"></i> Асосий саҳифа</a>
        </div>

        <div class="search-box">
            <input type="text" id="searchChannel" placeholder="Канал қидириш...">
        </div>
        <div class="channel-list" id="channelList">Юкланмоқда...</div>
    </div>

    <div class="main-content">
        <div class="player-container">
            <video id="videoPlayer" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto"></video>
        </div>
        <div class="player-footer">
            <div class="current-title" id="currentTrackTitle">Канал танланмади</div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.4/dash.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-dash/5.1.1/videojs-contrib-dash.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
            authDomain: "universal-portal-108b7.firebaseapp.com",
            databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "universal-portal-108b7",
            storageBucket: "universal-portal-108b7.appspot.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Глобал массив — қидирув тизими фойдаланиши учун
        let globalChannels = [];

        // 1. Плеерни рўйхатдан ўтказиш (Бу жуда муҳим!)
        const player = videojs('videoPlayer');

        // 2. Firebase базадан каналларни реал вақтда олиш
        const playlistRef = ref(db, 'universal_playlist');
        onValue(playlistRef, (snapshot) => {
            const data = snapshot.val();
            const listContainer = document.getElementById('channelList');
            
            if (data && Array.isArray(data)) {
                globalChannels = data; // Базадаги каналларни массивга оламиз
                renderChannels(globalChannels);
            } else {
                listContainer.innerHTML = '<div style="padding:10px; color:#aaa; text-align:center;">Базада плейлист топилмади. Админ панелдан юкланг.</div>';
            }
        });

        // 3. Каналларни экранга чиқариш функцияси
        function renderChannels(channelData) {
            const listContainer = document.getElementById('channelList');
            if (!listContainer) return;
            listContainer.innerHTML = '';

            if (channelData.length === 0) {
                listContainer.innerHTML = '<div style="padding:10px; color:#aaa; text-align:center;">Канал топилмади</div>';
                return;
            }

            channelData.forEach((channel) => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                
                // Канал босилганда ижро этиш функциясига боғлаш
                item.onclick = () => playChannel(channel, item);

                item.innerHTML = `
                    <img class="channel-logo" src="${channel.logo}" onerror="this.src='http://rafail1982.uz/favicon.png'">  
                    <div class="channel-name">${channel.name}</div>   
                `;
                listContainer.appendChild(item);
            });
        }

        // 4. Канални плеерда ишга тушириш
        function playChannel(channel, element) {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('currentTrackTitle').innerText = channel.name;

            // Форматни аниқлаш
            let type = 'application/x-mpegURL'; // HLS (.m3u8)
            if (channel.url.includes('.mpd')) {
                type = 'application/dash+xml'; // DASH
            } else if (channel.url.includes('.mp4')) {
                type = 'video/mp4'; // MP4
            }

            // Плеерга янги линкни бериш
            player.src({
                src: channel.url,
                type: type
            });
            
            player.play().catch(error => {
                console.log("Авто-плей чекланди ёки линкда хатолик:", error);
            });
        }

        // 5. Қидирув тизимини боғлаш
        document.getElementById('searchChannel').oninput = function() {
            const query = this.value.toLowerCase();
            const filtered = globalChannels.filter(channel => channel.name.toLowerCase().includes(query));
            renderChannels(filtered);
        };
    </script>
</body>
</html>
