        .video-js { width: 100% !important; height: 100% !important; }
        .search-box { padding: 15px; }
        .search-box input { width: 100%; padding: 10px; border-radius: 5px; border: none; background: #222; color: #fff; box-sizing: border-box; }
        .search-box input:focus { outline: 1px solid #ef1a4a; }
        .player-footer { padding: 20px; background: #111; border-top: 1px solid #222; }

        let channels = [];
        let player;

        document.addEventListener('DOMContentLoaded', () => {
            player = videojs('videoPlayer');
            parseM3U(rawM3uData);
            renderChannels(channels);
        });

        // М3U Парсер — Ортиқча #EXTVLCOPT қаторларини ўтказиб юборади
        function parseM3U(data) {
            const lines = data.split('\n');
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;

                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {};
                    
                    // Логотипни ажратиб олиш
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : 'http://rafail1982.uz/favicon.png';
                    
                    // Канал номини ажратиб олиш
                    const commaIndex = line.lastIndexOf(',');
                    currentChannel.name = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : 'Номаълум канал';
                } else if (line.startsWith('#')) {
                    // Агар қатор #EXTVLCOPT ёки бошқа созлама бўлса, шунчаки ташлаб ўтилади
                    continue;
                } else if (currentChannel) {
                    // Видео ҳаволасини олиш
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            }
        }

        // Каналларни чап менюга чиқариш
        function renderChannels(channelData) {
            const listContainer = document.getElementById('channelList');
            listContainer.innerHTML = '';

            if(channelData.length === 0) {
                listContainer.innerHTML = '<div style="padding:10px; color:#aaa;">Канал топилмади</div>';
                return;
            }

            channelData.forEach((channel) => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                item.onclick = () => playChannel(channel, item);

                item.innerHTML = `
                    <img class="channel-logo" src="${channel.logo}" onerror="this.src='http://rafail1982.uz/favicon.png'">
                    <div class="channel-name">${channel.name}</div>
                `;
                listContainer.appendChild(item);
            });
        }

        // Канални плеерда ишга тушириш
        function playChannel(channel, element) {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('currentTrackTitle').innerText = channel.name;

            // Видео форматини аниқлаш (.m3u8, .mpd ёки .mp4)
            let type = 'application/x-mpegURL'; // HLS учун стандарт
            
            if (channel.url.includes('.mpd')) {
                type = 'application/dash+xml'; // DASH учун
            } else if (channel.url.includes('.mp4')) {
                type = 'video/mp4'; // MP4 учун
            }

            player.src({
                src: channel.url,
                type: type
            });
            
            player.play().catch(error => {
                console.log("Авто-плей блокланди ёки трансляцияда хатолик:", error);
            });
        }

        // Қидирув функцияси
        function filterChannels() {
            const query = document.getElementById('searchChannel').value.toLowerCase();
            const filtered = channels.filter(channel => channel.name.toLowerCase().includes(query));
            renderChannels(filtered);
        }
