        const player = videojs('videoPlayer');
        const channelListEl = document.getElementById('channelList');

        function parseM3U(data) {
            const lines = data.split('\n');
            let channels = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i + 1];
                    if (url && url.startsWith('http')) {
                        channels.push({ name, url });
                    }
                }
            }
            return channels;
        }

        function loadChannels() {
            const channels = parseM3U(rawM3uData);
            channelListEl.innerHTML = '';
            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<span class="channel-name">${ch.name}</span>`;
                div.onclick = () => {
                    player.src({ src: ch.url, type: 'application/x-mpegURL' });
                    player.play();
                    document.getElementById('currentTrackTitle').innerText = ch.name;
                };
                channelListEl.appendChild(div);
            });
        }

        function filterChannels() {
            const query = document.getElementById('searchChannel').value.toLowerCase();
            document.querySelectorAll('.channel-item').forEach(item => {
                const name = item.innerText.toLowerCase();
                item.style.display = name.includes(query) ? 'flex' : 'none';
            });
        }

        loadChannels();
