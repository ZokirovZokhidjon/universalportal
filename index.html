 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Portal - Асосий Саҳифа</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Оригинал ранглар */
        :root { 
            --blue: #c5c5be; 
            --dark: #26323d; 
            --bg: #19749e; 
            --orange: #30698a; 
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ-Aqm5aA_IYIYZ1w08k071qDbCx72bVwEffQ&s); background-size: cover; margin: 0; }
        
        .test-banner { background-image: var(--orange); color: rgb(243, 241, 241); text-align: center; padding: 10px; font-weight: bold; }
        
        header { background: #42b2c9; padding: 20px; border-bottom: 2px solid var(--blue); text-align: center; position: relative; }
        header h1 { margin: 0 0 15px 0; color: var(--dark); font-size: 28px; }
        header img { border-radius: 50%; border: 3px groove red; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 100px; height: 100px; }
        
        .admin-icon { position: absolute; top: 20px; right: 20px; font-size: 30px; color: var(--blue); text-decoration: none; transition: 0.3s; }
        .admin-icon:hover { color: var(--dark); }
        
        .search-container { max-width: 500px; margin: 15px auto; display: flex; gap: 5px; padding: 0 15px; }
        .search-container input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .search-container button { padding: 10px 20px; background: var(--blue); color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* Реклама блоки услублари */
        #adBlock { max-width: 1200px; margin: 15px auto; display: none; text-align: center; padding: 0 15px; }
        #adBlock img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* МЕНЮ БАР (overflow олиб ташланди, тугмалар сиғиши таъминланди) */
        .menu-bar { background: white; padding: 10px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 5px; }
        
        /* Менюдаги оддий тугмалар */
        .menu-btn { background: #d63f10; border: 1px solid var(--blue); color: white; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: 500; transition: 0.2s; display: inline-block; vertical-align: middle; }
        .menu-btn.active { background: var(--blue); color: white; }
        
        /* Дропдаун контейнери */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* Очилувчи бош тугма */
        .main-drop-btn {
            background-color: #34495e;
            color: white;
        }

        /* ОЧИЛУВЧИ БЛОК (Мутлақ кўриниши учун стиллар тўғриланди) */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 200px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.2);
            z-index: 9999;
            border-radius: 8px;
            margin-top: 8px;
            right: 0; /* Ўнг томонга текисланди, ташқарига чиқиб кетмайди */
            overflow: hidden;
            border: 1px solid #ddd;
        }

        /* Дропдаун ичидаги тугмаларнинг стили */
        .dropdown-content .menu-btn {
            color: #26323d !important;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: left;
            background: none !important;
            border: none !important;
            margin: 0;
            border-radius: 0;
            cursor: pointer;
            box-sizing: border-box;
            border-bottom: 1px solid #eee;
            font-weight: normal;
        }

        .dropdown-content .menu-btn:last-child {
            border-bottom: none;
        }

        /* Сичқонча устига келганда */
        .dropdown-content .menu-btn:hover {
            background-color: #f1f1f1 !important;
            color: #d63f10 !important;
        }

        /* Ичидаги актив категория ранги */
        .dropdown-content .menu-btn.active {
            background-color: #19749e !important;
            color: white !important;
        }

        /* Тв каналлар ҳаволаси */
        .tv-link {
            display: block !important;
            color: wheat !important;
            background-color: #2c3e50 !important;
            text-align: center !important;
            text-decoration: none;
        }
        
        .tv-link:hover {
            background-color: #34495e !important;
        }

        /* Менюни очиш класси */
        .show {
            display: block !important;
        }
        
        /* Контент қисми */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-tag { font-size: 11px; background: var(--blue); color: #fff; padding: 3px 8px; border-radius: 5px; align-self: flex-start; margin-bottom: 10px; }
        .card-title { font-size: 18px; margin: 0 0 15px 0; color: var(--dark); font-weight: bold; line-height: 1.4; }
        .card-stats { font-size: 12px; color: #555; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .read-more { margin-top: auto; color: #548bca; text-decoration: none; font-weight: bold; font-size: 14px; border-top: 1px solid #f5f5f5; padding-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="test-banner">📢 Ушбу сайт тест режимида ишламоқда</div>

<header>
    <a class='admin-icon' href='admin.html' title='Шахсий кабинет'><i class="fas fa-user-circle"></i></a>
    <h1>UNIVERSAL PORTAL</h1>
    <img src="logo1.jpg" alt="logo" onerror="this.style.display='none'">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Сайтдан қидириш...">
        <button onclick="searchPosts()">Қидириш</button>
    </div>
</header>

<div id="adBlock">
    <a id="adLink" href="#" target="_blank">
        <img id="adImg" src="" alt="Реклама">
    </a>
</div>

<nav class="menu-bar">
    <button class="menu-btn active" onclick="filterCat('all', this)">Ҳаммаси</button>
    <button class="menu-btn" onclick="filterCat('Янгиликлар', this)">Янгиликлар</button>
    <button class="menu-btn" onclick="filterCat('Кинотеатр', this)">Кинотеатр</button>
    <button class="menu-btn" onclick="filterCat('Клиплар', this)">Клиплар</button>
    
    <div class="dropdown">
        <button class="menu-btn main-drop-btn" id="mainDropBtn" onclick="toggleDropdown(event)">
            Бошқалар <span class="arrow">▼</span>
        </button>
        
        <div id="dropdownContent" class="dropdown-content">
            <button class="menu-btn" onclick="filterCat('Tabobat', this)">Табобат</button>
            <button class="menu-btn" onclick="filterCat('Ҳикоялар', this)">Ҳикоялар</button>
            <button class="menu-btn" onclick="filterCat('Хангомалар', this)">Хангомалар</button>
            <button class="menu-btn" onclick="filterCat('Кулинария', this)">Кулинария</button>
            <button class="menu-btn" onclick="filterCat('Шеърият', this)">Шеърият</button>   
            <a href="tv.html" class="menu-btn tv-link">Тв каналлар</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="news-grid" id="newsWrapper">Юкланмоқда...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
        databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-portal-108b7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // МЕНЮНИ ОЧИШ ВА ЁПИШ ФУНКЦИЯЛАРИ
    window.toggleDropdown = function(event) {
        event.stopPropagation(); // Босилганда дарров ёпилиб кетмаслиги учун
        document.getElementById("dropdownContent").classList.toggle("show");
    }

    window.addEventListener('click', function(event) {
        if (!event.target.matches('.main-drop-btn') && !event.target.matches('.arrow')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    });

    // Рекламани Firebase дан юклаш
    onValue(ref(db, 'ads'), (s) => {
        const ad = s.val();
        if(ad && ad.img) {
            document.getElementById('adBlock').style.display = 'block';
            document.getElementById('adImg').src = ad.img;
            document.getElementById('adLink').href = ad.link || "#";
        }
    });

    let allPosts = {};

    // Мақолаларни олиш
    onValue(ref(db, 'all_posts'), (snapshot) => {
        allPosts = snapshot.val() || {};
        renderPosts('all');
    });

    // Категория танлаш функцияси
    window.filterCat = (category, btn) => {
        // Ҳамма тугмалардан active классни олиб ташлаш
        document.querySelectorAll('.menu-bar .menu-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Агар яширин категория танланса, бош тугма матнини ўзгартириш
        const mainBtn = document.getElementById('mainDropBtn');
        const hiddenCats = ['Tabobat', 'Ҳикоялар', 'Хангомалар', 'Кулинария', 'Шеърият'];
        
        if(hiddenCats.includes(category)) {
            mainBtn.innerHTML = `${category} <span class="arrow">▼</span>`;
            mainBtn.classList.add('active'); // "Бошқалар" тугмасини ҳам актив қилиш
        } else {
            mainBtn.innerHTML = `Бошқалар <span class="arrow">▼</span>`;
        }
        
        renderPosts(category);
        // Танлангандан кейин рўйхатни ёпиш
        document.getElementById("dropdownContent").classList.remove("show");
    };

    // Қидириш тизими
    window.searchPosts = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderPosts('all', term);
    };

    function renderPosts(category, searchTerm = "") {
        const wrapper = document.getElementById('newsWrapper');
        wrapper.innerHTML = "";
        
        const keys = Object.keys(allPosts).reverse();
        let found = 0;

        keys.forEach(id => {
            const p = allPosts[id];
            
            const matchCat = (category === 'all' || p.category === category);
            const matchSearch = p.title.toLowerCase().includes(searchTerm);

            if (matchCat && matchSearch) {
                found++;
                const card = document.createElement('div');
                card.className = 'card';
                
                let mediaHtml = "";
                if (p.image) {
                    mediaHtml = `<img src="${p.image}" class="card-img" alt="${p.title}" onerror="this.style.display='none'">`;
                } else if (p.video) {
                    mediaHtml = `<div class="video-container">${p.video}</div>`;
                }

                card.innerHTML = `
                    ${mediaHtml}
                    <div class="card-body">
                        <span class="card-tag" style="background:${p.category ? 'var(--blue)' : 'transparent'}">${p.category || ''}</span>
                        <h2 class="card-title">${p.title}</h2>
                        <div class="card-stats">
                            <span><i class="far fa-clock"></i> ${p.time || 'Яқинда'}</span>
                            <span><i class="fas fa-eye"></i> ${p.views || 0} та кўриш</span>
                        </div>
                        <a href="post.html?id=${id}" class="read-more">Батафсил ўқиш...</a>
                    </div>
                `;
                wrapper.appendChild(card);
            }
        });

        if (found === 0) {
            wrapper.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color:#fff;">Маълумот топилмади.</p>`;
        }
    }
</script>
</body>
</html>
