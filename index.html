<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Portal - Асосий Саҳифа</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #3498db; --dark: #2c3e50; --bg: #2e3c49; --orange: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .test-banner { background: var(--orange); color: white; text-align: center; padding: 10px; font-weight: bold; }
        header { background: #46b0be; padding: 20px; border-bottom: 2px solid var(--blue); text-align: center; position: relative; }
        header img { width: 100px; height: 100px; border-radius: 50%; border: 3px groove red; margin-bottom: 10px; }
        .admin-icon { position: absolute; top: 20px; right: 20px; font-size: 30px; color: var(--blue); }
        .search-container { max-width: 500px; margin: 15px auto; display: flex; gap: 5px; }
        .search-container input { flex: 1; padding: 10px; border: none; border-radius: 8px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; flex-grow: 1; }
        .card-stats { font-size: 12px; color: #555; margin: 10px 0; display: flex; align-items: center; gap: 10px; }
        .read-more { color: var(--blue); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="test-banner">📢 Ушбу сайт тест режимида ишламоқда</div>
<header>
    <a class='admin-icon' href='admin.html'><i class="fas fa-user-circle"></i></a>
    <h1>UNIVERSAL PORTAL</h1>
    <img src="logo1.jpg" alt="logo" onerror="this.style.display='none'">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Қидириш...">
        <button onclick="searchPosts()">Қидириш</button>
    </div>
</header>

<div class="news-grid" id="newsWrapper">Юкланмоқда...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const db = getDatabase(initializeApp({
        apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
        databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-portal-108b7"
    }));

    let allPosts = {};
    onValue(ref(db, 'all_posts'), (snapshot) => {
        allPosts = snapshot.val() || {};
        renderPosts('all');
    });

    window.searchPosts = () => {
        renderPosts('all', document.getElementById('searchInput').value.toLowerCase());
    };

    function renderPosts(category, searchTerm = "") {
        const wrapper = document.getElementById('newsWrapper');
        wrapper.innerHTML = "";
        Object.keys(allPosts).reverse().forEach(id => {
            const p = allPosts[id];
            if ((category === 'all' || p.category === category) && p.title.toLowerCase().includes(searchTerm)) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    ${p.image ? `<img src="${p.image}" class="card-img" onerror="this.style.display='none'">` : ''}
                    <div class="card-body">
                        <span class="card-tag" style="background:${p.category ? 'var(--blue)' : 'transparent'}">${p.category || ''}</span>
                        <h2 class="card-title">${p.title}</h2>
                        <div class="card-stats">
                            <span><i class="far fa-clock"></i> ${p.time || 'Яқинда'}</span>
                            <span><i class="fas fa-eye"></i> ${p.views || 0} та кўриш</span>
                        </div>
                        <a href="post.html?id=${id}" class="read-more">Батафсил ўқиш...</a>
                    </div>
                `;
                wrapper.appendChild(card);
            }
        });
    }
</script>
</body>
</html>
