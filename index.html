<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Portal - Асосий Саҳифа</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #3498db; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: var(--dark); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        
        .main-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        
        /* КАРТОЧКА ФОРМАТИ */
        .post-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .post-card:hover { transform: translateY(-5px); }
        .post-img { width: 100%; height: 350px; object-fit: cover; }
        
        .post-body { padding: 25px; }
        .category-tag { background: var(--blue); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; text-transform: uppercase; }
        .post-title { font-size: 26px; color: var(--dark); margin: 15px 0; line-height: 1.3; }
        .post-excerpt { color: #666; line-height: 1.6; margin-bottom: 20px; font-size: 16px; }
        
        .read-more-btn { display: inline-block; background: var(--blue); color: white; text-decoration: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .read-more-btn:hover { background: #2980b9; box-shadow: 0 5px 15px rgba(52,152,219,0.3); }
        
        .post-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; color: #999; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>UNIVERSAL PORTAL</h1>
</header>

<div class="main-container" id="posts-wrapper">
    <div style="text-align:center; padding:50px;"><i class="fas fa-spinner fa-spin fa-3x" style="color:var(--blue)"></i></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
        authDomain: "universal-portal-108b7.firebaseapp.com",
        databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-portal-108b7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const postsWrapper = document.getElementById('posts-wrapper');

    onValue(ref(db, 'all_posts'), (snapshot) => {
        const data = snapshot.val();
        postsWrapper.innerHTML = "";
        
        if (data) {
            Object.keys(data).reverse().forEach(id => {
                const post = data[id];
                // Матнни қисқартириш (180 та белги)
                const excerpt = post.content ? post.content.substring(0, 180) + "..." : "";
                
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    ${post.image ? `<img src="${post.image}" class="post-img" alt="image">` : ''}
                    <div class="post-body">
                        <span class="category-tag">${post.category}</span>
                        <h2 class="post-title">${post.title}</h2>
                        <p class="post-excerpt">${excerpt}</p>
                        <a href="post.html?id=${id}" class="read-more-btn">Батафсил ўқиш</a>
                        <div class="post-meta">
                            <span><i class="far fa-calendar-alt"></i> ${post.time}</span>
                            <span><i class="far fa-user"></i> Администратор</span>
                        </div>
                    </div>
                `;
                postsWrapper.appendChild(card);
            });
        } else {
            postsWrapper.innerHTML = "<h3>Ҳозирча мақолалар йўқ.</h3>";
        }
    });
</script>
</body>
</html>
